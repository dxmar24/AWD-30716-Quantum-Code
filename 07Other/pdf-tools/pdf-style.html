<style>
  :root {
    --ink: #172033;
    --muted: #5f6b7a;
    --rule: #d9dee7;
    --accent: #1d4f73;
    --accent-dark: #14364f;
    --accent-soft: #eef5f9;
    --paper: #ffffff;
    --code-bg: #f4f7fa;
  }

  @page {
    size: A4;
    margin: 18mm 16mm 20mm 16mm;
  }

  html {
    background: var(--paper);
  }

  body {
    color: var(--ink);
    font-family: "Segoe UI", Aptos, Arial, sans-serif;
    font-size: 10.5pt;
    line-height: 1.55;
    margin: 0;
  }

  body::before {
    content: "American Latin Class Attendance System";
    display: block;
    color: var(--accent-dark);
    border-bottom: 2px solid var(--accent);
    font-size: 9pt;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 18px;
    padding-bottom: 8px;
    text-transform: uppercase;
  }

  h1,
  h2,
  h3,
  h4 {
    color: var(--accent-dark);
    font-weight: 700;
    line-height: 1.22;
    page-break-after: avoid;
  }

  h1 {
    border-bottom: 1px solid var(--rule);
    font-size: 24pt;
    margin: 0 0 18px;
    padding-bottom: 10px;
  }

  h2 {
    font-size: 16pt;
    margin: 24px 0 10px;
  }

  h3 {
    color: var(--accent);
    font-size: 12.5pt;
    margin: 18px 0 8px;
  }

  h4 {
    font-size: 11pt;
    margin: 14px 0 6px;
  }

  p {
    margin: 0 0 10px;
  }

  a {
    color: var(--accent);
    text-decoration: none;
  }

  blockquote {
    background: var(--accent-soft);
    border-left: 4px solid var(--accent);
    color: var(--ink);
    margin: 14px 0;
    padding: 10px 14px;
  }

  ul,
  ol {
    margin: 8px 0 12px 20px;
    padding: 0;
  }

  li {
    margin: 3px 0;
  }

  table {
    border-collapse: collapse;
    font-size: 9.2pt;
    margin: 14px 0 18px;
    page-break-inside: auto;
    width: 100%;
  }

  thead {
    display: table-header-group;
  }

  tr {
    page-break-inside: avoid;
  }

  th {
    background: var(--accent-dark);
    color: #ffffff;
    font-weight: 700;
    text-align: left;
  }

  th,
  td {
    border: 1px solid var(--rule);
    overflow-wrap: break-word;
    padding: 7px 9px;
    vertical-align: top;
    word-break: normal;
  }

  td code {
    white-space: normal;
    word-break: break-all;
  }

  tbody tr:nth-child(even) {
    background: #f8fafc;
  }

  code {
    background: var(--code-bg);
    border: 1px solid #e6ebf1;
    border-radius: 4px;
    color: #7a2432;
    font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
    font-size: 9pt;
    padding: 1px 4px;
  }

  pre {
    background: var(--code-bg);
    border: 1px solid #dfe7ef;
    border-radius: 6px;
    font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
    font-size: 8.6pt;
    line-height: 1.45;
    margin: 12px 0 16px;
    overflow-wrap: break-word;
    padding: 12px;
    white-space: pre-wrap;
  }

  pre code {
    background: transparent;
    border: 0;
    color: inherit;
    padding: 0;
  }

  .toc,
  nav#TOC {
    background: #f7f9fb;
    border: 1px solid var(--rule);
    border-radius: 6px;
    margin: 0 0 18px;
    padding: 12px 14px;
  }

  nav#TOC::before {
    color: var(--accent-dark);
    content: "Table of Contents";
    display: block;
    font-size: 11pt;
    font-weight: 700;
    margin-bottom: 6px;
  }

  img {
    display: block;
    height: auto;
    margin: 14px auto;
    max-width: 100%;
  }

  hr {
    border: 0;
    border-top: 1px solid var(--rule);
    margin: 20px 0;
  }

  .subtitle,
  .date,
  .author {
    color: var(--muted);
  }

  .plantuml-diagram {
    align-items: center;
    border: 1px solid var(--rule);
    border-radius: 8px;
    display: flex;
    justify-content: center;
    margin: 14px 0 18px;
    min-height: 160px;
    padding: 14px;
  }

  .plantuml-diagram img {
    margin: 0 auto;
    max-height: 220mm;
  }

  .pdf-index-table td:first-child {
    font-weight: 700;
    width: 30%;
  }
</style>
