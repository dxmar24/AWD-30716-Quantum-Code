# Deployment template. Replace example.invalid locally.
# Database administration is intentionally not exposed here; use SSM/VPN/private access.
upstream alc_node_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream alc_analytics_app {
    server 127.0.0.1:8000;
    keepalive 8;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name academy.example.invalid;

    root /var/www/alc-frontend;
    location ^~ /.well-known/acme-challenge/ { try_files $uri =404; }
    location / { return 308 https://academy.example.invalid$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name academy.example.invalid;

    root /var/www/alc-frontend;
    index index.html;
    client_max_body_size 6m;

    ssl_certificate /etc/letsencrypt/live/academy.example.invalid/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/academy.example.invalid/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.googleusercontent.com https://*.gstatic.com; connect-src 'self' https://accounts.google.com; frame-src https://accounts.google.com https://www.google.com; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    location = /db-admin { return 404; }
    location ^~ /db-admin/ { return 404; }

    location /api/analytics/v1/ {
        proxy_pass http://alc_analytics_app/api/analytics/v1/;
        include proxy_params;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
    }

    location /api/v1/ {
        proxy_pass http://alc_node_app;
        include proxy_params;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
    }

    location /private/ {
        expires -1;
        if ($cookie_alc_session = "") { return 302 /login.html?session=expired; }
        try_files $uri $uri/ /index.html;
    }

    location = /login.html {
        expires -1;
        try_files $uri /index.html;
    }

    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
