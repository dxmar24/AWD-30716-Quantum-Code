server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _ 18-217-255-109.sslip.io;

    root /var/www/alc-frontend;
    index index.html;

    client_max_body_size 2m;

    location /api/analytics/v1/ {
        proxy_pass http://172.31.45.140:8000/api/analytics/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/auth/ {
        proxy_pass http://172.31.43.146:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/reports/ {
        proxy_pass http://172.31.32.254:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ {
        proxy_pass http://172.31.36.254:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Cache-Policy "public-static-immutable" always;
    }

    location /private/ {
        add_header Cache-Control "no-store" always;
        add_header X-Cache-Policy "sensitive-no-store" always;
        if ($cookie_alc_session = "") {
            return 302 /login.html?session=expired;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /login.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Cache-Policy "html-revalidate" always;
        try_files $uri /index.html;
    }

    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Cache-Policy "html-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 18-217-255-109.sslip.io;

    root /var/www/alc-frontend;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/18-217-255-109.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/18-217-255-109.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 2m;

    location /api/analytics/v1/ {
