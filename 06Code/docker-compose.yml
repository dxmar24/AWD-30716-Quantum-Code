name: proyecto-danza

services:
  postgres:
    image: postgres:16-alpine
    container_name: proyecto-danza-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: american_latin_class
      POSTGRES_USER: alc_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local secret environment}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - danza_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alc_user -d american_latin_class"]
      interval: 5s
      timeout: 5s
      retries: 12

  mailpit:
    image: axllent/mailpit:v1.27.8
    container_name: proyecto-danza-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"

volumes:
  danza_pgdata:
