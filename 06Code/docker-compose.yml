services:
  postgres:
    image: postgres:16-alpine
    container_name: alc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: american_latin_class
      POSTGRES_USER: alc_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - alc-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alc_user -d american_latin_class"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  alc-postgres-data:
